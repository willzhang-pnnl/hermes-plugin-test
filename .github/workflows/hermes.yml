name: HERMES metadata harvest

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harvest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install HERMES and plugins
        run: |
          python -m pip install --upgrade pip
          pip install hermes>=0.8.0 hermes-plugin-python>=0.1.8

      - name: Run HERMES harvest
        run: |
          hermes harvest
